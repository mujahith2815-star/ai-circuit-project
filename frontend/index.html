<!DOCTYPE html>
<html>
<head>
  <title>AI Circuit Studio</title>

  <link rel="stylesheet" href="style.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Fabric -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
</head>

<body>

<div class="app-shell">

  <!-- TOP -->
  <div class="top-toolbar">
    <div class="brand-wrap">
      <h1>AI Circuit Studio</h1>
      <p>Smart schematic generator</p>
    </div>

    <button class="small-btn" onclick="clearCanvas()">Clear</button>
  </div>

  <!-- LEFT -->
  <div class="left-toolbar">
    <h2>Tools</h2>
    <div class="left-tool" onclick="addComponent('resistor')">Resistor</div>
    <div class="left-tool" onclick="addComponent('led')">LED</div>
    <div class="left-tool" onclick="addComponent('battery')">Battery</div>
    <div class="left-tool" onclick="addComponent('capacitor')">Capacitor</div>
    <div class="left-tool" onclick="addComponent('switch')">Switch</div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-stage">
    <div class="status-bar">
      <p>Canvas Ready</p>
    </div>

    <div class="canvas-host">
      <canvas id="canvas" width="900" height="500"></canvas>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-sidebar">

    <div class="info-card">
      <h2>🤖 AI Assistant</h2>

      <div id="chatBox" class="chat-box">
        <div class="ai-msg">AI: Hello 👋 Tell me what circuit you want</div>
      </div>

      <div class="chat-input-row">
        <input id="chatInput" placeholder="Describe your circuit...">
        <button id="sendBtn">Send</button>
      </div>

      <button id="generateBtn" class="gen-btn">Generate Circuit</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>        </div>
      </header>

      <aside class="left-toolbar">
        <h2>Draw</h2>
        <button type="button" class="left-tool" data-component="Resistor">
          <svg viewBox="0 0 80 24" aria-hidden="true"><path d="M2 12h14l4-7 8 14 8-14 8 14 8-14 4 7h14"/></svg>
          <span>Resistor</span>
        </button>
        <button type="button" class="left-tool" data-component="Capacitor">
          <svg viewBox="0 0 80 24" aria-hidden="true"><path d="M2 12h26M32 4v16M48 4v16M48 12h30"/></svg>
          <span>Capacitor</span>
        </button>
        <button type="button" class="left-tool" data-component="LED">
          <svg viewBox="0 0 80 24" aria-hidden="true"><path d="M2 12h22M24 4v16l18-8zM46 4v16M46 12h30M52 6l8-5M57 9l8-5"/></svg>
          <span>LED</span>
        </button>
        <button type="button" class="left-tool" data-component="Ground">
          <svg viewBox="0 0 80 24" aria-hidden="true"><path d="M40 2v7M30 11h20M33 15h14M36 19h8"/></svg>
          <span>Ground</span>
        </button>
        <button type="button" class="left-tool" data-component="Battery">
          <svg viewBox="0 0 80 24" aria-hidden="true"><path d="M2 12h20M22 5v14M33 7v10M44 5v14M55 7v10M55 12h23"/></svg>
          <span>Battery</span>
        </button>
        <button type="button" class="left-tool" data-component="IC">
          <svg viewBox="0 0 80 24" aria-hidden="true"><path d="M24 4h32v16H24zM18 6h6M18 12h6M18 18h6M56 6h6M56 12h6M56 18h6"/></svg>
          <span>IC</span>
        </button>
      </aside>

      <main class="canvas-stage">
        <div class="status-bar">
          <p id="modeLabel">Tool: Select</p>
          <p id="statusLabel">Ready</p>
        </div>
        <section id="canvasHost" class="canvas-host">
          <canvas id="pcbCanvas"></canvas>
        </section>
      </main>

      <aside class="right-sidebar">
        <section class="info-card">
          <h2>Document</h2>
          <p>Grid: <span id="gridState">On</span></p>
          <p>Zoom: <span id="zoomState">100%</span></p>
        </section>

        <section class="info-card">
          <h2>Actions</h2>
          <div class="action-row">
            <button id="saveJsonBtn" type="button" class="small-btn">Save JSON</button>
            <button id="loadJsonBtn" type="button" class="small-btn">Load JSON</button>
          </div>
          <div class="action-row">
            <button id="exportPngBtn" type="button" class="small-btn">Export PNG</button>
          </div>
          <input id="loadJsonInput" type="file" accept="application/json" hidden />
        </section>
      </aside>
    </div>
  </body>
</html>
